<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feux de forêt 2023 — Saguenay–Lac-Saint-Jean</title>

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rouge:        #86282E;
      --orange:       #e07b00;
      --header-bg:    #86282E;
      --panel-bg:     #f9f9f9;
      --panel-border: #dde2e8;
      --box-bg:       #ffffff;
      --box-shadow:   0 2px 8px rgba(0,0,0,0.08);
      --text-main:    #2a2a2a;
      --text-muted:   #6b7280;
      --text-label:   #374151;
    }

    html { height: 100%; overflow: hidden; }
    body {
      height: 100%; overflow: hidden;
      font-family: 'Source Sans 3', sans-serif;
      background: var(--panel-bg); color: var(--text-main);
      display: flex; flex-direction: column;
    }

    #header {
      flex-shrink: 0;
      height: 48px; background: var(--header-bg);
      display: flex; align-items: center;
      padding: 0 16px; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10;
    }
    #header .flame { font-size: 20px; flex-shrink: 0; }
    #header h1 {
      font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase; color: #fff; line-height: 1.25;
    }
    #header .year-badge {
      margin-left: auto; flex-shrink: 0;
      background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px; padding: 2px 8px;
      font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 2px;
      color: rgba(255,255,255,0.9);
    }

    #app { flex: 1; min-height: 0; display: flex; overflow: hidden; }

    #panel {
      width: 340px; min-width: 340px; flex-shrink: 0;
      background: var(--panel-bg);
      border-right: 1px solid var(--panel-border);
      display: flex; flex-direction: column;
      overflow: hidden; padding: 12px 12px; gap: 10px;
    }
    .panel-section { display: flex; flex-direction: column; gap: 6px; }
    .panel-label {
      font-family: 'Oswald', sans-serif; font-size: 10px;
      letter-spacing: 1.4px; text-transform: uppercase; color: var(--text-muted);
    }

    select {
      width: 100%; background: var(--box-bg);
      border: 1px solid var(--panel-border); border-radius: 6px;
      color: var(--text-main); font-family: 'Source Sans 3', sans-serif;
      font-size: 13px; padding: 7px 9px;
      cursor: pointer; outline: none; transition: border-color 0.2s;
      box-shadow: var(--box-shadow);
    }
    select:focus, select:hover { border-color: var(--orange); }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { flex: 1; accent-color: var(--orange); cursor: pointer; height: 4px; }
    .slider-val {
      font-family: 'Oswald', sans-serif; font-size: 12px;
      color: var(--orange); min-width: 36px; text-align: right;
    }

    .divider { border: none; border-top: 1px solid var(--panel-border); }

    #info-box {
      background: var(--box-bg); border: 1px solid var(--panel-border);
      border-radius: 8px; padding: 9px 11px; box-shadow: var(--box-shadow);
      display: flex; flex-direction: column; gap: 5px; min-height: 90px;
    }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .info-key { font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    .info-val { font-family: 'Oswald', sans-serif; font-size: 13px; color: var(--text-main); text-align: right; }
    .info-val.big { font-size: 16px; color: var(--orange); }
    .info-empty { color: var(--text-muted); font-size: 12px; text-align: center; margin: auto; line-height: 1.5; }

    #chart-wrap {
      background: var(--box-bg); border: 1px solid var(--panel-border);
      border-radius: 8px; padding: 10px; box-shadow: var(--box-shadow);
    }
    #myChart { width: 100% !important; }

    .layer-toggles { display: flex; flex-direction: column; gap: 5px; }
    .toggle-row {
      display: flex; align-items: center; gap: 9px;
      font-size: 12px; color: var(--text-label);
      cursor: pointer; user-select: none;
    }
    .toggle-row input[type=checkbox] { accent-color: var(--rouge); cursor: pointer; }
    .toggle-swatch { width: 13px; height: 13px; border-radius: 3px; flex-shrink: 0; }

    /* ── Resizer ── */
    #resizer {
      width: 6px; flex-shrink: 0;
      background: var(--panel-border);
      cursor: col-resize; transition: background 0.15s;
      position: relative; z-index: 5;
    }
    #resizer:hover, #resizer.dragging { background: var(--orange); }
    #resizer::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 2px; height: 32px;
      background: rgba(0,0,0,0.15); border-radius: 2px;
    }

    #map { flex: 1; position: relative; overflow: hidden; }
    #map-container { width: 100%; height: 100%; }

    #basemap-switch {
      position: absolute; top: 8px; right: 8px; z-index: 5;
      display: flex; background: rgba(255,255,255,0.95);
      border: 1px solid #d1d5db; border-radius: 5px;
      overflow: hidden; box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }
    .bm-btn {
      padding: 5px 10px; font-family: 'Source Sans 3', sans-serif;
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      border: none; background: transparent; border-right: 1px solid #d1d5db;
      transition: background 0.15s, color 0.15s; white-space: nowrap;
    }
    .bm-btn:last-child { border-right: none; }
    .bm-btn.active { background: var(--header-bg); color: #fff; }
    .bm-btn:hover:not(.active) { background: #f3f4f6; color: var(--text-main); }

    #loading {
      position: absolute; inset: 0; background: #f9f9f9;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 100; transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: var(--rouge); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: 'Oswald', sans-serif; letter-spacing: 2px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; }

    #panel::-webkit-scrollbar { width: 4px; }
    #panel::-webkit-scrollbar-track { background: transparent; }
    #panel::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Chargement des données…</p>
</div>

<div id="header">
  <span class="flame">🔥</span>
  <h1>Feux de forêt en 2023 au Saguenay–Lac-Saint-Jean</h1>
  <span class="year-badge">2023</span>
</div>

<div id="app">
  <div id="panel">

    <div class="panel-section">
      <span class="panel-label">Numéro de feu</span>
      <select id="sel-feu">
        <option value="">Vue d'ensemble</option>
      </select>
    </div>

    <div class="panel-section">
      <span class="panel-label">Transparence des feux</span>
      <div class="slider-row">
        <input type="range" id="slider-alpha" min="0" max="100" value="75" step="5" />
        <span class="slider-val" id="alpha-display">75 %</span>
      </div>
    </div>

    <hr class="divider" />

    <div class="panel-section">
      <span class="panel-label">Feu sélectionné</span>
      <div id="info-box">
        <span class="info-empty">Sélectionnez un feu<br>dans le menu ou sur la carte</span>
      </div>
    </div>

    <hr class="divider" />

    <div class="panel-section" style="flex:1; min-height:0; display:flex; flex-direction:column; gap:6px;">
      <span class="panel-label">Superficie (ha)</span>
      <div id="chart-wrap" style="flex:1; min-height:0; display:flex; flex-direction:column;">
        <div style="flex:1; min-height:0; position:relative;">
          <canvas id="myChart" style="position:absolute; inset:0;"></canvas>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <div class="panel-section">
      <span class="panel-label">Couches</span>
      <div class="layer-toggles">
        <label class="toggle-row">
          <input type="checkbox" id="tog-bg" checked />
          <span class="toggle-swatch" style="background:#86282E;"></span>
          Feux 2023 au Québec
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="tog-region" checked />
          <span class="toggle-swatch" style="background:#7f8c8d;border:1px solid #aaa;"></span>
          Région SLSJ
        </label>
        <label class="toggle-row">
          <input type="checkbox" id="tog-feux" checked />
          <span class="toggle-swatch" style="background:#990000;"></span>
          Feux SLSJ
        </label>
      </div>
    </div>

  </div>

  <div id="resizer"></div>

  <div id="map">
    <div id="map-container"></div>
    <div id="basemap-switch">
      <button class="bm-btn active" data-bm="satellite">Satellite</button>
      <button class="bm-btn"        data-bm="neutre">Neutre</button>
      <button class="bm-btn"        data-bm="sombre">Sombre</button>
    </div>
  </div>
</div>

<script>
const BOUNDS_INIT = [[-74.5, 48], [-69, 53]];

function googleSatelliteStyle() {
  return {
    version: 8,
    glyphs: 'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',
    sources: { 'google-sat': { type: 'raster', tiles: [
      'https://mt0.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      'https://mt2.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      'https://mt3.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
    ], tileSize: 256, attribution: '© Google' }},
    layers: [{ id: 'google-sat-layer', type: 'raster', source: 'google-sat', paint: { 'raster-opacity': 0.75 } }]
  };
}
const STYLE_URLS = {
  neutre: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  sombre: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
};

const Y_BREAKS = [0, 10, 100, 1000, 10000, 100000];
function pseudoLog(v, sigma=10) { return Math.sign(v) * Math.log1p(Math.abs(v/sigma)); }
const Y_TICKS_RAW   = Y_BREAKS.map(v => pseudoLog(v));
const Y_TICKS_LABEL = ['0','10','100','1 000','10 000','100 000'];

let map, chartInst;
let tableData    = {};
let bboxByNofeu  = {};
let selectedFeu  = null;
let currentAlpha = 0.75;
let currentBm    = 'satellite';
let geojsonFeux, geojsonBg, geojsonRegion;

function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return new Intl.NumberFormat('fr-CA', { maximumFractionDigits: 1 }).format(n) + ' ha';
}
function fmtDate(s) {
  if (!s || s === 'null' || s === 'NA') return '—';
  const [y, m, d] = s.split('-');
  return `${d}/${m}/${y}`;
}
function flatCoords(geom) {
  if (!geom) return [];
  if (geom.type === 'Polygon')      return geom.coordinates.flat();
  if (geom.type === 'MultiPolygon') return geom.coordinates.flat(2);
  return [];
}
function buildBboxIndex(geojson) {
  const index = {};
  geojson.features.forEach(f => {
    const n = String(f.properties.NOFEU);
    if (!index[n]) index[n] = { minLng:Infinity, minLat:Infinity, maxLng:-Infinity, maxLat:-Infinity };
    flatCoords(f.geometry).forEach(([lng, lat]) => {
      if (lng < index[n].minLng) index[n].minLng = lng;
      if (lng > index[n].maxLng) index[n].maxLng = lng;
      if (lat < index[n].minLat) index[n].minLat = lat;
      if (lat > index[n].maxLat) index[n].maxLat = lat;
    });
  });
  return index;
}

function initChart() {
  const ctx = document.getElementById('myChart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['—'],
      datasets: [{ data: [pseudoLog(0)], backgroundColor: '#d1d5db', borderColor: '#c0392b', borderWidth: 1, borderRadius: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
      layout: { padding: { top: 6 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: () => { const row = selectedFeu ? tableData[selectedFeu] : null; return row ? fmtNum(row.SUP_HA) : '0 ha'; } } }
      },
      scales: {
        x: { ticks: { color: '#6b7280', font: { family: 'Source Sans 3', size: 10, weight: '600' }, maxRotation: 0 }, grid: { color: 'rgba(0,0,0,0.05)' } },
        y: {
          min: pseudoLog(0), max: pseudoLog(100000) * 1.05,
          ticks: { color: '#6b7280', font: { family: 'Source Sans 3', size: 9 },
            callback: (val) => { const idx = Y_TICKS_RAW.findIndex(v => Math.abs(v - val) < 0.01); return idx >= 0 ? Y_TICKS_LABEL[idx] : ''; }
          },
          afterBuildTicks: (axis) => { axis.ticks = Y_TICKS_RAW.map(v => ({ value: v })); },
          grid: { color: 'rgba(0,0,0,0.06)' }
        }
      }
    }
  });
}

function updateChart(nofeu) {
  const row = nofeu ? tableData[nofeu] : null;
  const v   = row ? (row.SUP_HA || 0) : 0;
  chartInst.data.labels           = [nofeu || 'Sélectionnez un feu'];
  chartInst.data.datasets[0].data = [pseudoLog(v)];
  chartInst.data.datasets[0].backgroundColor = nofeu ? '#86282E' : '#d1d5db';
  chartInst.update();
}

function updateInfoBox(nofeu) {
  const box = document.getElementById('info-box');
  if (!nofeu) { box.innerHTML = '<span class="info-empty">Sélectionnez un feu<br>dans le menu ou sur la carte</span>'; return; }
  const r = tableData[nofeu];
  if (!r) { box.innerHTML = '<span class="info-empty">Données non disponibles</span>'; return; }
  box.innerHTML = `
    <div class="info-row"><span class="info-key">Feu</span><span class="info-val">${r.NOFEU}</span></div>
    <div class="info-row"><span class="info-key">Cause</span><span class="info-val">${r.CAUSE || '—'}</span></div>
    <div class="info-row"><span class="info-key">Superficie</span><span class="info-val big">${fmtNum(r.SUP_HA)}</span></div>
    <div class="info-row"><span class="info-key">Début</span><span class="info-val">${fmtDate(r.DATE_DEBUT)}</span></div>
    <div class="info-row"><span class="info-key">Éteint</span><span class="info-val">${fmtDate(r.DATE_ETEIN)}</span></div>`;
}

function addAllLayers() {
  const bgVis     = document.getElementById('tog-bg').checked     ? 'visible' : 'none';
  const regionVis = document.getElementById('tog-region').checked ? 'visible' : 'none';
  const feuxVis   = document.getElementById('tog-feux').checked   ? 'visible' : 'none';

  map.addSource('bg',     { type: 'geojson', data: geojsonBg });
  map.addSource('region', { type: 'geojson', data: geojsonRegion });
  map.addSource('feux',   { type: 'geojson', data: geojsonFeux });

  map.addLayer({ id: 'bg-fill', type: 'fill', source: 'bg', layout: { visibility: bgVis }, paint: { 'fill-color': '#86282E', 'fill-opacity': 0.75 } });
  map.addLayer({ id: 'region-fill', type: 'fill', source: 'region', layout: { visibility: regionVis }, paint: { 'fill-color': '#bdc3c7', 'fill-opacity': 0.35 } });
  map.addLayer({ id: 'region-line', type: 'line', source: 'region', layout: { visibility: regionVis }, paint: { 'line-color': '#7f8c8d', 'line-width': 1, 'line-opacity': 0.8 } });
  map.addLayer({ id: 'feux-fill', type: 'fill', source: 'feux', layout: { visibility: feuxVis }, paint: { 'fill-color': '#990000', 'fill-opacity': currentAlpha } });

  const selFilter = selectedFeu ? ['==', ['get','NOFEU'], selectedFeu] : ['==', ['get','NOFEU'], '___NONE___'];
  map.addLayer({ id: 'feux-selected-line', type: 'line', source: 'feux', filter: selFilter, layout: { visibility: feuxVis }, paint: { 'line-color': '#ff9900', 'line-width': 2.5, 'line-opacity': 1 } });

  const tooltip = new maplibregl.Popup({ closeButton: false, closeOnClick: false, className: 'map-tooltip' });
  map.on('mouseenter', 'feux-fill', (e) => { map.getCanvas().style.cursor = 'pointer'; tooltip.setLngLat(e.lngLat).setHTML(`<strong>No. feu : ${e.features[0].properties.NOFEU}</strong>`).addTo(map); });
  map.on('mousemove', 'feux-fill', (e) => { tooltip.setLngLat(e.lngLat); });
  map.on('mouseleave', 'feux-fill', () => { map.getCanvas().style.cursor = ''; tooltip.remove(); });
  map.on('click', 'feux-fill', (e) => { selectFeu(e.features[0].properties.NOFEU); });
  map.on('click', (e) => { if (map.queryRenderedFeatures(e.point, { layers: ['feux-fill'] }).length === 0) selectFeu(null); });
}

function zoomToFeu(nofeu) {
  const bb = bboxByNofeu[nofeu];
  if (!bb || !isFinite(bb.minLng)) return;
  const pad = 0.04;
  map.fitBounds([[bb.minLng-pad, bb.minLat-pad], [bb.maxLng+pad, bb.maxLat+pad]], { padding: 50, duration: 800, maxZoom: 14 });
}

function selectFeu(nofeu) {
  selectedFeu = nofeu || null;
  document.getElementById('sel-feu').value = nofeu || '';
  const filter = nofeu ? ['==', ['get','NOFEU'], nofeu] : ['==', ['get','NOFEU'], '___NONE___'];
  if (map.getLayer('feux-selected-line')) map.setFilter('feux-selected-line', filter);
  updateInfoBox(nofeu);
  updateChart(nofeu);
  if (!nofeu) { map.fitBounds(BOUNDS_INIT, { padding: 20, duration: 800 }); } else { zoomToFeu(nofeu); }
}

function switchBasemap(bm) {
  if (bm === currentBm) return;
  currentBm = bm;
  const center = map.getCenter(), zoom = map.getZoom();
  map.setStyle(bm === 'satellite' ? googleSatelliteStyle() : STYLE_URLS[bm]);
  map.once('styledata', () => { map.jumpTo({ center, zoom }); addAllLayers(); });
}

async function initMap() {
  const [feuxGJ, bgGJ, regionGJ, tableJSON] = await Promise.all([
    fetch('data/feux.geojson').then(r => r.json()),
    fetch('data/bg.geojson').then(r => r.json()),
    fetch('data/region.geojson').then(r => r.json()),
    fetch('data/table.json').then(r => r.json()),
  ]);
  geojsonFeux = feuxGJ; geojsonBg = bgGJ; geojsonRegion = regionGJ;
  tableJSON.forEach(row => { tableData[String(row.NOFEU)] = row; });
  bboxByNofeu = buildBboxIndex(feuxGJ);

  const sel = document.getElementById('sel-feu');
  Object.keys(bboxByNofeu)
    .sort((a,b) => { const na=parseFloat(a),nb=parseFloat(b); return (!isNaN(na)&&!isNaN(nb))?na-nb:a.localeCompare(b); })
    .forEach(n => { const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });

  map = new maplibregl.Map({
    container: 'map-container', style: googleSatelliteStyle(),
    bounds: BOUNDS_INIT, fitBoundsOptions: { padding: 20 }, attributionControl: false,
  });
  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');
  map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');
  map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
  map.on('load', () => { addAllLayers(); document.getElementById('loading').classList.add('hidden'); });
}

document.getElementById('sel-feu').addEventListener('change', (e) => { selectFeu(e.target.value || null); });
document.getElementById('slider-alpha').addEventListener('input', (e) => {
  currentAlpha = e.target.value / 100;
  document.getElementById('alpha-display').textContent = e.target.value + ' %';
  if (map && map.getLayer('feux-fill')) map.setPaintProperty('feux-fill', 'fill-opacity', currentAlpha);
});
document.getElementById('tog-bg').addEventListener('change', (e) => { if (map && map.getLayer('bg-fill')) map.setLayoutProperty('bg-fill', 'visibility', e.target.checked ? 'visible' : 'none'); });
document.getElementById('tog-region').addEventListener('change', (e) => { if (!map) return; const v = e.target.checked ? 'visible' : 'none'; ['region-fill','region-line'].forEach(l => { if(map.getLayer(l)) map.setLayoutProperty(l,'visibility',v); }); });
document.getElementById('tog-feux').addEventListener('change', (e) => { if (!map) return; const v = e.target.checked ? 'visible' : 'none'; ['feux-fill','feux-selected-line'].forEach(l => { if(map.getLayer(l)) map.setLayoutProperty(l,'visibility',v); }); });
document.querySelectorAll('.bm-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); switchBasemap(btn.dataset.bm);
  });
});

const ts = document.createElement('style');
ts.textContent = `.map-tooltip .maplibregl-popup-content { background: rgba(15,15,15,0.92); color: #f1f1f1; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 4px 10px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.5); } .map-tooltip .maplibregl-popup-tip { display: none; }`;
document.head.appendChild(ts);

initChart();
initMap();

// ── Resizable panel ──
(function() {
  const resizer = document.getElementById('resizer');
  const panel   = document.getElementById('panel');
  let dragging = false, startX = 0, startW = 0;
  resizer.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startW = panel.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newW = Math.min(Math.max(startW + (e.clientX - startX), 200), window.innerWidth * 0.7);
    panel.style.width = newW + 'px';
    panel.style.minWidth = newW + 'px';
    if (map) map.resize();
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false; resizer.classList.remove('dragging');
    document.body.style.cursor = ''; document.body.style.userSelect = '';
    if (map) map.resize();
  });
})();
</script>
</body>
</html>
